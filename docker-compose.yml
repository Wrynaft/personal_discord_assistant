services:
  postgres:
    image: postgres:16
    container_name: discord_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: discord_analytics
      POSTGRES_USER: discord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-discord_analytics_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord -d discord_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: discord_kafka
    restart: unless-stopped
    environment:
      # KRaft mode is default in official image — no ZooKeeper needed
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Auto-create topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Retention: keep events for 7 days
      KAFKA_LOG_RETENTION_HOURS: 168
      # Single-broker: must set replication factor to 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Memory tuning for small VPS
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms512m"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data

  redis:
    image: redis:7-alpine
    container_name: discord_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  superset:
    image: apache/superset:3.1.3
    container_name: discord_superset
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-discord-superset-secret-2026}
      # Redis cache
      REDIS_URL: redis://redis:6379/0
      # Default admin credentials (change after first login!)
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_EMAIL: admin@localhost
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
      - ./superset/superset_init.sh:/app/superset_init.sh
    command: ["/bin/bash", "/app/superset_init.sh"]

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  superset_data:
